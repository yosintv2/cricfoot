name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  schedule:
    - cron: '0 * * * *'   # Rebuilds every hour so match schedules and the sitemap stay current
  workflow_dispatch:       # Allow manual trigger from GitHub Actions tab

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_BASE_PATH: "" 

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Ping Google sitemap
        run: curl -s "https://www.google.com/ping?sitemap=https://www.cricfoot.net/sitemap.xml" -o /dev/null

      - name: Ping Bing IndexNow
        run: |
          curl -s -X POST "https://api.indexnow.org/indexnow" \
            -H "Content-Type: application/json" \
            -d '{"host":"www.cricfoot.net","key":"${{ secrets.INDEXNOW_KEY }}","urlList":["https://www.cricfoot.net/","https://www.cricfoot.net/tonight/","https://www.cricfoot.net/tomorrow/","https://www.cricfoot.net/this-weekend/"]}' \
            -o /dev/null

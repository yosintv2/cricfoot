name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_BASE_PATH: ""

      # Upload API JSON files to Cloudflare R2
      - name: Install AWS CLI
        run: pip install awscli

      - name: Upload API to R2
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
        run: |
          aws s3 sync date/ \
            s3://${{ secrets.R2_BUCKET }}/date/ \
            --endpoint-url=${{ secrets.R2_ENDPOINT }}

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Ping Google sitemap
        run: curl -s "https://www.google.com/ping?sitemap=https://www.cricfoot.net/sitemap.xml" -o /dev/null

      - name: Ping Bing IndexNow
        run: |
          curl -s -X POST "https://api.indexnow.org/indexnow" \
            -H "Content-Type: application/json" \
            -d '{"host":"www.cricfoot.net","key":"${{ secrets.INDEXNOW_KEY }}","urlList":["https://www.cricfoot.net/","https://www.cricfoot.net/tonight/","https://www.cricfoot.net/tomorrow/","https://www.cricfoot.net/this-weekend/"]}' \
            -o /dev/null
